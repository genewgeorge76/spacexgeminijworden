<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>J. Worden &amp; Sons Paving LLC | Asphalt Paving Chester &amp; Richmond VA</title>
  <meta name="description" content="Family-owned asphalt paving in Chester, VA serving Chesterfield, Richmond, Midlothian and surrounding counties since 1984. Driveways, parking lots, sealcoating, tar &amp; chip. Class A licensed. Call 804-446-1296.">
  <meta name="theme-color" content="#0a0a0a" />

  <!-- Performance: preconnect to font + analytics origins so DNS/TLS handshakes happen in parallel with HTML parse. -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://www.googletagmanager.com" />

  <!-- Performance: preload the LCP poster (AVIF → WebP → JPG fallback handled by <picture> in VideoHero). -->
  <link
    rel="preload"
    as="image"
    href="/video/hero-paving-poster.avif"
    type="image/avif"
    fetchpriority="high"
    imagesrcset="/video/hero-paving-poster.avif"
  />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": ["PavingContractor", "LocalBusiness"],
    "name": "J. Worden & Sons Paving LLC",
    "url": "https://jwordenasphaltpaving.com",
    "telephone": "+1-804-446-1296",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "1601 Ware Bottom Spring Rd, Suite 214",
      "addressLocality": "Chester",
      "addressRegion": "VA",
      "postalCode": "23836",
      "addressCountry": "US"
    },
    "award": [
      "Best of Houzz Award Winner (4-Time)",
      "2026 Top Contractor - Pavement Maintenance & Reconstruction"
    ],
    "hasCredential": [
      { "@type": "EducationalOccupationalCredential", "name": "NASCLA Certified Commercial Contractor" },
      { "@type": "EducationalOccupationalCredential", "name": "Virginia Class A Contractor" }
    ]
  }
  </script>

  <!-- GA4 + Google Ads Conversion Tracking -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BJX8RPZ10X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BJX8RPZ10X');

    // Conversion helper — call from anywhere
    window.track_conversion = function(action, label) {
      gtag('event', action, {
        event_category: 'conversion',
        event_label: label || '',
        value: 1
      });
    };

    // Track all tel: and sms: link clicks automatically
    document.addEventListener('click', function(e) {
      var link = e.target.closest('a[href]');
      if (!link) return;
      var href = link.getAttribute('href') || '';
      if (href.startsWith('tel:')) {
        gtag('event', 'conversion', { event_category: 'engagement', event_label: 'phone_call', value: 1 });
        gtag('event', 'phone_call_click', { phone_number: '804-446-1296' });
      }
      if (href.startsWith('sms:')) {
        gtag('event', 'conversion', { event_category: 'engagement', event_label: 'text_message', value: 1 });
        gtag('event', 'text_message_click', { phone_number: '804-446-1296' });
      }
    });
  </script>
</head>
<body>
  <!-- Netlify Forms detection (build-time scan). Hidden from users; React form posts here at runtime. -->
  <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="text" name="bot-field" />
    <input type="text" name="firstName" />
    <input type="text" name="lastName" />
    <input type="tel"  name="phone" />
    <input type="email" name="email" />
    <input type="text" name="serviceAddress" />
    <textarea name="jobDescription"></textarea>
  </form>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
