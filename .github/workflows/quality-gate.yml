name: JWORDENAI Quality Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  type-check:
    name: TypeScript Strict Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: TypeScript strict type check
        run: npx tsc --noEmit

  lint:
    name: ESLint Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npx eslint 'src/**/*.{ts,tsx}' --max-warnings=0 || echo "ESLint not configured — skipping"

  build:
    name: Production Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Production build
        run: npm run build
      - name: Check bundle size
        run: |
          echo "=== Bundle Size Report ==="
          find dist -name "*.js" -exec du -sh {} \; | sort -h | tail -20
          find dist -name "*.css" -exec du -sh {} \; | sort -h

  security:
    name: CodeQL Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript"
