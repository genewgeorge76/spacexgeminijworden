version: 2
updates:
  # npm dependencies — auto-patch security fixes
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    groups:
      # Group minor/patch updates for cleaner PRs
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Don't auto-bump major versions — review manually
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — keep actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "github-actions"
      - "dependencies"
