[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/mclean-residential-paving.html"
  to = "/locations/mclean"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[plugins]]
  package = "@netlify/plugin-sitemap"
  [plugins.inputs]
    baseUrl = "https://jwordenasphaltpaving.com"
    # This ignores the "Trash" files so they never show up in Google
    exclude = [
      "./index.bak.html",
      "./src/data/products.ts",
      "**/404.html"
    ]
