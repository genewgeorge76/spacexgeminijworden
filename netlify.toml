[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-sitemap"
  [plugins.inputs]
    baseUrl = "https://jwordenasphaltpaving.com"
    buildDir = "dist"
    prettyURLs = true

[[redirects]]
  # Essential for TanStack Router stability
  from = "/*"
  to = "/index.html"
  status = 200
