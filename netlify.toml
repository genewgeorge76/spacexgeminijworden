[build]
  command = "vite build"
  publish = "dist/client"
[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

[[plugins]]
  package = "@netlify/plugin-sitemap"

  [plugins.inputs]
    buildDir = "/" # Tells the plugin to scan your main folder
    prettyURLs = true

[[redirects]]
  from = "/commercial"
  to = "/commercial.html"
  status = 200

[[redirects]]
  from = "/masonry"
  to = "/masonry.html"
  status = 200
