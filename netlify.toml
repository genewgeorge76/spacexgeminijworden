[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-sitemap"
  [plugins.inputs]
    baseUrl = "https://jwordenasphaltpaving.com"
    # This ensures TanStack's dist folder is crawled perfectly
    distPath = "dist"
    prettyUrls = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
