[build]
  command  = "npm run build"
  publish  = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "https://jwordenasphaltpaving.com/*"
  to   = "https://www.jwordenasphaltpaving.com/:splat"
  status = 301
  force  = true

# SPA fallback so client-side routes (e.g. /residential, /contact) work on direct hit / refresh
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection       = "1; mode=block"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
