[build]
  command  = "npx puppeteer browsers install chrome && npm run build"
  publish  = "dist"

[build.environment]
  NODE_VERSION        = "22"
  PUPPETEER_CACHE_DIR = "/opt/buildhome/.cache/puppeteer"

[context.production.environment]
  VITE_LEADS_API_URL = "https://codexbuildfreeofbase44-production.up.railway.app/api/v1/leads/website"
  VITE_AI_CHAT_URL   = "https://codexbuildfreeofbase44-production.up.railway.app/api/v1/public/chat"

# Apex → www redirect
[[redirects]]
  from   = "https://jwordenasphaltpaving.com/*"
  to     = "https://www.jwordenasphaltpaving.com/:splat"
  status = 301
  force  = true

# Static files served directly (before SPA fallback)
[[redirects]]
  from   = "/robots.txt"
  to     = "/robots.txt"
  status = 200
  force  = true

[[redirects]]
  from   = "/sitemap.xml"
  to     = "/sitemap.xml"
  status = 200
  force  = true

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "SAMEORIGIN"
    X-Content-Type-Options    = "nosniff"
    X-XSS-Protection          = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache HTML: always revalidate
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache assets: immutable
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
